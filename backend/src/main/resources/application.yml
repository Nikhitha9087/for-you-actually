spring:
  application:
    name: for-you-actually
  datasource:
    url: jdbc:h2:file:./data/fya;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  # Hosts (Render, Railway, Fly) inject the port via $PORT; default to 8080 locally.
  port: ${PORT:8080}
  error:
    include-message: always

# Keys are read from environment variables so they never get committed.
# Set them in your shell before running:
#   $env:TMDB_API_KEY="..."   ;  $env:GEMINI_API_KEY="..."
fya:
  tmdb:
    # Prefer FYA_TMDB_KEY (reliable fresh secret name on hosts), fall back to TMDB_API_KEY.
    api-key: ${FYA_TMDB_KEY:${TMDB_API_KEY:}}
    base-url: https://api.themoviedb.org/3
    image-base-url: https://image.tmdb.org/t/p/w500
  gemini:
    # Prefer FYA_GEMINI_KEY, fall back to GEMINI_API_KEY for existing local .env files.
    api-key: ${FYA_GEMINI_KEY:${GEMINI_API_KEY:}}
    base-url: https://generativelanguage.googleapis.com/v1beta
    embedding-model: gemini-embedding-001
    chat-model: gemini-2.5-flash-lite
  # Primary text-generation provider (blurbs + taste mirror). Generous free tier.
  # Gemini above stays as the automatic fallback; embeddings always use Gemini.
  groq:
    # Prefer FYA_GROQ_KEY (fresh secret name on the host), fall back to GROQ_API_KEY
    # so existing local .env files keep working.
    api-key: ${FYA_GROQ_KEY:${GROQ_API_KEY:}}
    base-url: https://api.groq.com/openai/v1
    chat-model: llama-3.3-70b-versatile

logging:
  level:
    com.foryouactually: INFO
